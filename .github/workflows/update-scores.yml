name: Update DOOKEELA scores

on:
  schedule:
    - cron: "0 * * * *"      # ทุกชั่วโมง (72 req/วัน อยู่ใต้ลิมิตฟรี 100/วัน)
  workflow_dispatch: {}       # กดรันเองได้จากหน้า Actions

permissions:
  contents: write             # ให้ commit ไฟล์ data.json กลับเข้า repo ได้

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch fixtures -> docs/data.json
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-scores.mjs

      - name: Commit if changed
        run: |
          git config user.name  "dookeela-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "ไม่มีการเปลี่ยนแปลง ข้ามการ commit"
          else
            git commit -m "chore: update scores $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
